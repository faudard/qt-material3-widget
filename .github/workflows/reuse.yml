name: License compliance

on:
  push:
  pull_request:

jobs:
  reuse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install REUSE
        run: python -m pip install --upgrade reuse

      - name: Run REUSE lint
        run: reuse lint

      - name: Run project license checks
        run: ./scripts/check-license.sh
