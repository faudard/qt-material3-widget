name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-qt6
            os: ubuntu-latest
            qt-version: "6.7.3"
            use-mcu: "OFF"

          - name: windows-qt6
            os: windows-latest
            qt-version: "6.7.3"
            use-mcu: "OFF"

          - name: macos-qt6
            os: macos-latest
            qt-version: "6.7.3"
            use-mcu: "OFF"

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux runtime packages
        if: runner.os == 'Linux'
        run: ./scripts/ci/install-ubuntu-deps.sh

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt-version }}
          cache: true

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DQTMATERIAL3_BUILD_TESTS=ON
          -DQTMATERIAL3_BUILD_EXAMPLES=ON
          -DQTMATERIAL3_BUILD_CONSUMER_EXAMPLES=${{ matrix.name == 'ubuntu-qt6' && 'ON' || 'OFF' }}
          -DQTMATERIAL3_BUILD_THEMING_EXAMPLES=${{ matrix.name == 'ubuntu-qt6' && 'ON' || 'OFF' }}
          -DQTMATERIAL3_BUILD_BENCHMARKS=OFF
          -DQTMATERIAL3_USE_MCU=${{ matrix.use-mcu }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
              xvfb-run -a --server-args="-screen 0 1920x1080x24" \
                bash -c 'openbox >/tmp/openbox.log 2>&1 & ctest --test-dir build --output-on-failure'
          else
            ctest --test-dir build --build-config Release --output-on-failure
          fi

      - name: Validate install/export consumer
        if: matrix.name == 'ubuntu-qt6'
        run: bash scripts/validate-install-consumer.sh