name: Install Consumer

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: install-consumer-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-consume:
    name: Install and consume exported package
    runs-on: ubuntu-latest

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build xvfb libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          cache: true

      - name: Validate install/export consumer
        run: bash scripts/validate-install-consumer.sh
