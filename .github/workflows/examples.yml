name: Examples

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: examples-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-examples:
    name: Build example applications
    runs-on: ubuntu-latest

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build xvfb libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          cache: true

      - name: Configure examples
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DQTMATERIAL3_BUILD_TESTS=OFF
          -DQTMATERIAL3_BUILD_EXAMPLES=ON
          -DQTMATERIAL3_BUILD_CONSUMER_EXAMPLES=ON
          -DQTMATERIAL3_BUILD_THEMING_EXAMPLES=ON
          -DQTMATERIAL3_USE_MCU=OFF

      - name: Build examples
        run: cmake --build build --config Release
