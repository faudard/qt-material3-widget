name: quality

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  license:
    name: license
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install REUSE
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade reuse

      - name: Run REUSE lint
        run: reuse lint

      - name: Run project license check
        run: |
          if [ -x scripts/check-license.sh ]; then
            ./scripts/check-license.sh
          else
            echo "scripts/check-license.sh is missing or not executable"
            exit 1
          fi

  docs:
    name: docs
    runs-on: ubuntu-latest

    env:
      DOCS_BASE_URL: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system documentation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            doxygen \
            graphviz \
            libxml2-utils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python documentation dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f docs/requirements.txt ]; then
            python -m pip install -r docs/requirements.txt
          elif [ -f requirements-docs.txt ]; then
            python -m pip install -r requirements-docs.txt
          else
            python -m pip install \
              sphinx \
              breathe \
              myst-parser \
              furo \
              sphinx-copybutton
          fi

      - name: Generate Doxygen XML
        run: doxygen Doxyfile

      - name: Validate Doxygen XML
        run: |
          find build/doxygen/xml -name '*.xml' -print0 \
            | xargs -0 -n1 xmllint --noout

      - name: Build Sphinx documentation
        run: |
          sphinx-build \
            --builder html \
            --fail-on-warning \
            --keep-going \
            docs \
            docs/_build/html

      - name: Upload documentation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-html
          path: docs/_build/html
          if-no-files-found: ignore